<!DOCTYPE html>
<html>
<head>
<title>Singh Family Tree</title>

<style>

body{
font-family:Arial;
text-align:center;
background:#f4f6f8;
}

h1{
background:#2c3e50;
color:white;
padding:20px;
}

.section{
margin:30px;
}

.container{
display:flex;
flex-wrap:wrap;
justify-content:center;
}

.card{
background:white;
margin:10px;
padding:15px;
border-radius:10px;
box-shadow:0 3px 8px rgba(0,0,0,0.1);
width:200px;
}

.card img{
width:100px;
height:100px;
border-radius:50%;
}

</style>

</head>

<body>

<h1>Singh Family</h1>

<div class="section">

<h2>Parents</h2>

<div class="container">

<div class="card">
<img src="father.jpg">
<h3>Father Name</h3>
<p>Father</p>
</div>

<div class="card">
<img src="mother.jpg">
<h3>Mother Name</h3>
<p>Mother</p>
</div>

</div>

</div>

<div class="section">

<h2>Four Brothers</h2>

<div class="container">

<div class="card">
<img src="brother1.jpg">
<h3>Brother 1</h3>
<p>Spouse: Wife Name</p>
<p>Children: Child1, Child2</p>
</div>

<div class="card">
<img src="brother2.jpg">
<h3>Brother 2</h3>
<p>Spouse: Wife Name</p>
<p>Children: Child1</p>
</div>

<div class="card">
<img src="brother3.jpg">
<h3>Brother 3</h3>
<p>Spouse: Wife Name</p>
<p>Children: Child1</p>
</div>

<div class="card">
<img src="brother4.jpg">
<h3>Brother 4</h3>
<p>Spouse: Wife Name</p>
<p>Children: Child1</p>
</div>

</div>

</div>

</body>
</html>
